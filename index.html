<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snake Game - JavaScript</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background: #1a1a2e;
            font-family: 'Courier New', Courier, monospace;
        }
        canvas {
            border: 4px solid #0f3460;
            box-shadow: 0 0 20px rgba(233, 69, 96, 0.5);
        }
        h1 {
            color: #e94560;
            margin-bottom: 10px;
        }
        .controls {
            color: #fff;
            margin-top: 15px;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <h1>SNAKE GAME</h1>
    <canvas id="gameCanvas" width="400" height="400"></canvas>
    <p class="controls">Use Arrow Keys or WASD to move</p>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        const gridSize = 20;
        const tileCount = canvas.width / gridSize;

        let score = 0;
        let highScore = localStorage.getItem('snakeHighScore') || 0;

        let playerX = 10;
        let playerY = 10;
        let velocityX = 0;
        let velocityY = 0;

        let foodX = 15;
        let foodY = 15;

        let snakeTrail = [];
        let tail = 5;

        window.onload = function() {
            document.addEventListener("keydown", keyPush);
            setInterval(game, 1000/15);
        }

        function game() {
            playerX += velocityX;
            playerY += velocityY;

            if(playerX < 0) {
                playerX = tileCount - 1;
            }
            if(playerX > tileCount - 1) {
                playerX = 0;
            }
            if(playerY < 0) {
                playerY = tileCount - 1;
            }
            if(playerY > tileCount - 1) {
                playerY = 0;
            }

            ctx.fillStyle = "#16213e";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = "#e94560";
            ctx.fillRect(foodX * gridSize, foodY * gridSize, gridSize - 2, gridSize - 2);

            ctx.fillStyle = "#0f3460";
            for(let i = 0; i < snakeTrail.length; i++) {
                ctx.fillRect(snakeTrail[i].x * gridSize, snakeTrail[i].y * gridSize, gridSize - 2, gridSize - 2);

                if(snakeTrail[i].x === playerX && snakeTrail[i].y === playerY) {
                    if(tail > 5) {
                        tail = 5;
                        score = 0;
                    }
                }
            }

            snakeTrail.push({x: playerX, y: playerY});
            while(snakeTrail.length > tail) {
                snakeTrail.shift();
            }

            if(foodX === playerX && foodY === playerY) {
                tail++;
                score += 10;
                foodX = Math.floor(Math.random() * tileCount);
                foodY = Math.floor(Math.random() * tileCount);
                
                if(score > highScore) {
                    highScore = score;
                    localStorage.setItem('snakeHighScore', highScore);
                }
            }

            ctx.fillStyle = "#fff";
            ctx.font = "16px Courier New";
            ctx.fillText("Score: " + score, 10, 20);
            ctx.fillText("High Score: " + highScore, canvas.width - 140, 20);
        }

        function keyPush(evt) {
            switch(evt.keyCode) {
                case 37:
                    if(velocityX !== 1) {
                        velocityX = -1;
                        velocityY = 0;
                    }
                    break;
                case 38:
                    if(velocityY !== 1) {
                        velocityX = 0;
                        velocityY = -1;
                    }
                    break;
                case 39:
                    if(velocityX !== -1) {
                        velocityX = 1;
                        velocityY = 0;
                    }
                    break;
                case 40:
                    if(velocityY !== -1) {
                        velocityX = 0;
                        velocityY = 1;
                    }
                    break;
                case 65:
                case 97:
                    if(velocityX !== 1) {
                        velocityX = -1;
                        velocityY = 0;
                    }
                    break;
                case 87:
                case 119:
                    if(velocityY !== 1) {
                        velocityX = 0;
                        velocityY = -1;
                    }
                    break;
                case 68:
                case 100:
                    if(velocityX !== -1) {
                        velocityX = 1;
                        velocityY = 0;
                    }
                    break;
                case 83:
                case 115:
                    if(velocityY !== -1) {
                        velocityX = 0;
                        velocityY = 1;
                    }
                    break;
            }
        }
    </script>
</body>
</html>
